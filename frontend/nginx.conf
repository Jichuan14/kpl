upstream kpl_api {
    server api:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # FastAPI previously compressed analytical payloads. Keep that benefit when
    # Nginx serves the published JSON directly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 2m;

    # Keep the admin UI and all data-changing operations private.
    location = /management {
        auth_basic "KPL management";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        try_files $uri /index.html;
    }

    location ^~ /api/sync/ {
        auth_basic "KPL management";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        proxy_pass http://kpl_api;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location ^~ /api/pipeline/ {
        auth_basic "KPL management";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        proxy_pass http://kpl_api;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location = /api/bp/recompute {
        auth_basic "KPL management";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        proxy_pass http://kpl_api;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 900s;
    }

    # Generated by the analysis pipeline and mounted from persistent storage.
    # These files never involve FastAPI during normal public page loads.
    location ^~ /assets/data/ {
        alias /usr/share/nginx/html/assets/data/;
        add_header Cache-Control "no-cache" always;
    }

    location ^~ /assets/heroes/ {
        alias /usr/share/nginx/html/assets/heroes/;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
    }

    location /api/ {
        proxy_pass http://kpl_api;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://kpl_api;
        include /etc/nginx/proxy_params;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
